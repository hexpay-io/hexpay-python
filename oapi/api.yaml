        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

# =============================================================================
# Security
# =============================================================================
security:
  - apiAuth: []

# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    apiAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token signed with the EdDSA algorithm. Obtain the token from the HexPay
        merchant dashboard and pass it via the `Authorization: Bearer <token>` header.

  # ---------------------------------------------------------------------------
  # Reusable parameters
  # ---------------------------------------------------------------------------
  parameters:
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      description: |
        Unique UUID v4 key for idempotent request processing. If the server receives
        two requests with the same key within a 24-hour window, the second returns
        the cached response from the first without creating a duplicate resource.
        Generate a fresh key for each logically distinct operation.
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

    PaymentID:
      name: paymentID
      in: path
      required: true
      description: Unique identifier of the payment (UUID).
      schema:
        type: string
        format: uuid
        example: "019327c6-2058-7901-b234-56789abcdeff"

  # ---------------------------------------------------------------------------
  # Reusable responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Authentication failed — token is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              type: "authentication_error"
              message: "Invalid or expired authentication token"
              code: "auth_invalid"

    InternalError:
      description: An unexpected internal server error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              type: "api_error"
              message: "An unexpected error occurred. Please retry the request or contact support."
              code: "internal_error"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # =========================================================================
    # Error model
    # =========================================================================
    ErrorResponse:
      type: object
      description: |
        Top-level error envelope returned for all non-2xx responses. All error
        information is nested under the `error` key to allow safe envelope detection
        without inspecting the HTTP status code.
      properties:
        error:
          $ref: "#/components/schemas/Error"
      required:
        - error

    Error:
      type: object
      description: |
        Structured error object. `type` gives the broad category, `code` is the
        machine-readable discriminator for programmatic handling, `message` is a
        human-readable explanation, and the optional `param` names the specific
        request field that caused the error.
      properties:
        type:
          type: string
          description: |
            High-level error category. Use this to determine the general class of
            the error without parsing `code`.
          enum:
            - invalid_request_error
            - authentication_error
            - not_found_error
            - rate_limit_error
            - api_error
          example: "invalid_request_error"
        message:
          type: string
          description: Human-readable description of the error, intended for developers.
          maxLength: 512
          example: "Amount must be a positive decimal number"
        code:
          type: string
          description: |
            Machine-readable error identifier. Use this in conditional logic to branch
            on specific error conditions (e.g., retry on `rate_limit_exceeded`,
            surface to user on `payment_not_cancellable`).
          example: "invalid_amount"
        param:
          type: string
          description: |
            The name of the request field that caused the error, using dot notation
            for nested fields (e.g., `currency`, `payment_options.methods[0]`).
            Present only when the error is attributable to a specific parameter.
          example: "amount"
      required:
        - type
        - message
        - code

    # =========================================================================
    # Create Payment — request schema (flat)
    # =========================================================================
    CreatePaymentRequest:
      type: object
      description: |
        Request body for creating a new payment. The body is intentionally flat:
        `amount`, `currency`, and all optional fields are top-level. The only nested
        structure is `payment_options.methods`, which describes an allowlist of
        acceptable payment methods.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: |
            The payment value as a positive decimal string. No leading zeros are
            permitted on the integer part (`"007"` is invalid; use `"7"`).
            For fiat currencies up to 2 decimal places are recommended.
            For crypto tickers precision depends on the coin.
          pattern: '^(0|[1-9]\d*)(\.\d+)?$'
          example: "100.00"
        currency:
          type: string
          description: |
            Ticker symbol for the denomination. Accepts fiat codes (e.g. `USD`, `EUR`,
            `RUB`) or TON-ecosystem coin tickers (e.g. `TON`, `USDT`).

            This field defines the **unit of value** — it does not determine the coin
            the customer pays with. Payment coin is controlled by `payment_options.methods`.

            For the full list of accepted values use `GET /v1/payment-methods` (coins)
            or refer to the supported fiat codes in your store settings.
          example: "USD"
        payment_options:
          $ref: "#/components/schemas/PaymentOptions"
        ttl:
          type: integer
          format: int64
          description: |
            Time-to-live in seconds. Defines how long the payment remains active
            from the moment of creation. Once the TTL elapses the payment moves to
            `expired` status — this can happen from either `created` or `pending`.

            Minimum: `900` (15 minutes). Maximum: `43200` (12 hours).
            Defaults to `3600` (1 hour) if not specified.
          minimum: 900
          maximum: 43200
          default: 3600
          example: 3600
        order_id:
          type: string
          maxLength: 128
          description: |
            Merchant-defined external order identifier. Use this to correlate a HexPay
            payment with your internal order or invoice system. Returned on all payment
            objects and included in webhook payloads.
          example: "order-2026-00123"
        description:
          type: string
          maxLength: 512
          description: |
            Human-readable description of the payment purpose. May be displayed to
            the customer on the payment page.
          example: "Premium subscription — 1 year"
        metadata:
          type: object
          description: |
            Arbitrary key-value pairs for merchant use. All values must be strings.
            Returned on all payment objects and included in webhook payloads.
            Maximum 10 keys; key names up to 64 characters, values up to 512 characters.
          maxProperties: 10
          additionalProperties:
            type: string
            maxLength: 512
          example:
            customer_id: "cust_abc123"
            customer_email: "customer@example.com"
        webhookURL:
          type: string
          format: uri
          pattern: '^https://(?!localhost|127\.|0\.0\.0\.0|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)\S+'
          maxLength: 512
          description: |
            HTTPS URL to which HexPay will POST webhook notifications for this
            payment's lifecycle events (e.g., transitions to `pending` or `completed`).

            Requirements:
            - Must use HTTPS. Plain HTTP URLs are rejected.
            - Must be publicly reachable from the internet. Loopback addresses
              (`localhost`, `127.x.x.x`) and private network ranges (`10.x.x.x`,
              `192.168.x.x`, `172.16–31.x.x`) are not allowed.
            - Make sure your server is configured to accept POST requests at this URL
              before creating payments.
          example: "https://merchant.com/webhooks/hexpay"

    # =========================================================================
    # Payment Options & Method Filter
    # =========================================================================
    PaymentOptions:
      type: object
      description: |
        Optional constraints on which payment methods are available at checkout.
        When omitted entirely, all payment methods enabled for your store are shown
        and the payment is created in `created` status.
      properties:
        methods:
          type: array
          description: |
            Exactly one method filter specifying both `coin` and `chain`.
            When provided, the payment is created directly in `pending` status with
            `paymentDetails` populated (Preselected).

            Omit this field entirely to let the customer select a payment method
            at checkout — payment starts in `created` status (Customer Choice).
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/MethodFilter"

    MethodFilter:
      type: object
      description: |
        A method filter specifying exactly which coin and chain to use for payment.
        Both `coin` and `chain` are required.

        Use the exact `symbol` values returned by `GET /v1/payment-methods`.
        Values are case-sensitive.
      required:
        - coin
        - chain
      properties:
        coin:
          type: string
          description: Coin ticker to match. Must be a coin supported by HexPay on TON.
          enum:
            - BUILD
            - BLUM
            - DOGS
            - DUST
            - DYOR
            - NOT
            - STON
            - TON
            - USDT
            - XAUt0
          example: "USDT"
        chain:
          type: string
          description: Chain ticker to match. Currently only `TON` is supported.
          enum:
            - TON
          example: "TON"

    # =========================================================================
    # Payment status (shared enum)
    # =========================================================================
    PaymentStatus:
      type: string
      description: |
        Lifecycle status of a payment:
        - `created`   — Payment created; customer has not yet selected a payment method.
          `paymentDetails` is absent.
        - `pending`   — Method confirmed; `paymentDetails` populated with the blockchain
          address and exact coin amount. Awaiting on-chain transfer.
        - `completed` — On-chain transfer confirmed. `transactionSignatures` are present.
        - `expired`   — Payment TTL elapsed without a confirmed transfer. Reachable from
          **both** `created` (customer never selected a method) and `pending` (customer
          selected but did not send the transfer in time).
        - `cancelled` — Canceled by the merchant via `POST /v1/payments/{id}/cancel`.
          Reachable from both `created` and `pending`.
      enum:
        - created
        - pending
        - completed
        - expired
        - cancelled
      example: "created"

    PaymentStatusResponse:
      type: object
      description: |
        Lightweight response containing only the current status of a payment.
        Use `GET /v1/payments/{paymentID}` when you also need the address,
        amount, or timer details.
      properties:
        status:
          $ref: "#/components/schemas/PaymentStatus"
      required:
        - status

    PaymentCancelResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PaymentStatus"
      required:
        - status

    # =========================================================================
    # Payment list
    # =========================================================================
    PaymentListResponse:
      type: object
      description: Paginated list of payments with cursor-based navigation metadata.
      properties:
        payments:
          type: array
          description: Array of payment objects for the current page.
          items:
            $ref: "#/components/schemas/PaymentResponse"
        cursor:
          type: string
          description: |
            Opaque pagination cursor. Present only when there are more pages of results.
            Pass this value as the `cursor` query parameter to retrieve the next page.
            When absent, the current page is the last one.
          example: "eyJpZCI6IjAxOTMyN2M2LTIwNTgtNzkwMS1iMjM0LTU2Nzg5YWJjZGVmZiJ9"
      required:
        - payments

    # =========================================================================
    # Full payment object
    # =========================================================================
    PaymentResponse:
      type: object
      description: |
        Full payment object. Returned by the create, retrieve, list, and cancel endpoints.
      properties:
        id:
          type: string
          format: uuid
          description: Unique payment identifier.
          example: "019327c6-2058-7901-b234-56789abcdeff"
        status:
          $ref: "#/components/schemas/PaymentStatus"
        amount:
          type: string
          description: |
            The denomination amount recorded at creation time. Mirrors the `amount`
            field from the create request.
          pattern: '^(0|[1-9]\d*)(\.\d+)?$'
          example: "100.00"
        currency:
          type: string
          description: |
            The denomination currency ticker recorded at creation time. Mirrors the
            `currency` field from the create request. May be a fiat code or a coin ticker.
          example: "USD"
        paymentDetails:
          $ref: "#/components/schemas/PaymentDetails"
          description: |
            Cryptocurrency payment instructions. Absent while status is `created`.
            Populated when the payment transitions to `pending` — either because the
            customer selected a method, or because a single exact method was
            pre-specified at creation.
        checkoutURL:
          type: string
          format: uri
          description: |
            URL of the HexPay-hosted checkout page for this payment. Redirect the
            customer to this URL to let them complete the payment.
          example: "https://payment.hexpay.io/019327c6-2058-7901-b234-56789abcdeff"
        order_id:
          type: string
          maxLength: 128
          description: Merchant-defined external order identifier, if provided at creation.
          example: "order-2026-00123"
        description:
          type: string
          maxLength: 512
          description: Payment description
          example: "Premium subscription — 1 year"
        timer:
          $ref: "#/components/schemas/PaymentTimerResponse"
      required:
        - id
        - status
        - amount
        - currency
        - timer
        - checkoutURL

    # =========================================================================
    # Payment sub-objects
    # =========================================================================
    PaymentTimerResponse:
      type: object
      description: |
        Lifecycle timing information for the payment.
      properties:
        createdAt:
          type: string
          format: date-time
          description: Payment creation timestamp in RFC 3339 format (UTC).
          example: "2026-01-20T10:00:00Z"
        expiresAt:
          type: string
          format: date-time
          description: |
            Timestamp (RFC 3339, UTC) at which the payment automatically moves to
            `expired` status. Subtract `createdAt` to derive the total TTL window.
          example: "2026-01-20T10:15:00Z"
        paidAt:
          type: string
          format: date-time
          description: |
            Timestamp (RFC 3339, UTC) at which the payment has been paid
          example: "2026-01-20T10:12:00Z"
      required:
        - createdAt
        - expiresAt

    PaymentDetails:
      type: object
      description: |
        Cryptocurrency payment instructions. Populated when the payment transitions
        from `created` to `pending`.

        The customer must send exactly `coinAmount` of `coin` to `address` on the
        TON blockchain.
      properties:
        address:
          type: string
          description: TON blockchain address the customer must send the cryptocurrency to.
          example: "UQBf_DO8wsBddOcMnGEOyREEHPPKMBL2F26GQFOV7FQdYY_a"
        coinAmount:
          type: string
          description: |
            Exact cryptocurrency amount the customer must transfer. Sending less
            than this amount will result in an underpayment.
          pattern: '^(0|[1-9]\d*)(\.\d+)?$'
          example: "35.782"
        coin:
          $ref: "#/components/schemas/CoinResponse"
        chain:
          $ref: "#/components/schemas/ChainResponse"
        transactionSignatures:
          type: array
          description: |
            On-chain transaction hash(es) confirming the payment.
            Present only when status is `completed`.
          items:
            type: string
          example:
            - "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      required:
        - address
        - coinAmount
        - coin
        - chain

    # =========================================================================
    # Shared coin / chain objects
    # =========================================================================
    CoinResponse:
      type: object
      description: Cryptocurrency (coin) metadata.
      properties:
        name:
          type: string
          description: Human-readable name of the cryptocurrency.
          example: "Tether"
        symbol:
          type: string
          description: |
            Ticker symbol. Use this value as the `coin` field in
            `payment_options.methods` when creating payments.
          enum:
            - BUILD
            - BLUM
            - DOGS
            - DUST
            - DYOR
            - NOT
            - STON
            - TON
            - USDT
            - XAUt0
          example: "USDT"
        imgUrl:
          type: string
          format: uri
          description: URL of the coin logo image.
          example: "https://assets.hexpay.io/coins/usdt.svg"
      required:
        - name
        - symbol
        - imgUrl

    ChainResponse:
      type: object
      description: Blockchain network metadata. Currently only TON is supported.
      properties:
        name:
          type: string
          description: Human-readable name of the blockchain network.
          example: "TON"
        symbol:
          type: string
          description: |
            Ticker symbol. Use this value as the `chain` field in
            `payment_options.methods` when creating payments.
          enum:
            - TON
          example: "TON"
        imgUrl:
          type: string
          format: uri
          description: URL of the chain logo image.
          example: "https://assets.hexpay.io/chains/ton.svg"
      required:
        - name
        - symbol
        - imgUrl

    # =========================================================================
    # Payment methods
    # =========================================================================
    PaymentMethodListResponse:
      type: object
      description: |
        List of all payment methods currently enabled for the store, wrapped in a
        consistent data envelope. Use `coin.symbol` and `chain.symbol` from each entry
        as filter inputs in `payment_options.methods` when creating payments.
      properties:
        data:
          type: array
          description: Array of enabled payment method objects.
          items:
            $ref: "#/components/schemas/PaymentMethodResponse"
      required:
        - data

    PaymentMethodResponse:
      type: object
      description: |
        A single payment method — a coin + chain combination accepted by the store.
        The `coin.symbol` / `chain.symbol` pair uniquely identifies the method for
        use in `payment_options.methods` filters.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this payment method configuration.
          example: "0197ef69-6825-7bb4-8cd8-770ab407e240"
        coin:
          $ref: "#/components/schemas/CoinResponse"
        chain:
          $ref: "#/components/schemas/ChainResponse"
      required:
        - id
        - coin
        - chain
